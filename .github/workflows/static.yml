name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Node.js to ensure the runner uses a modern version
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # You can use 22 or 24 to stay ahead of the deprecation

      # 2. Build the Vite project
      - name: Install and Build Client
        run: |
          cd client
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Upload the 'dist' folder created by the build step
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
